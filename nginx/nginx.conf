upstream stock-service {
    server stock-service:80;
}

upstream sales-service {
    server sales-service:80;
}

upstream purchase-service {
    server purchase-service:80;
}

server {
    listen 80;

    # Front-end — serve index.html at root
    root /usr/share/nginx/html;
    index index.html;

    location = / {
        try_files /index.html =404;
    }

    # Stock Service  → /stocks/...
    location /stocks {
        proxy_pass         http://stock-service;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # Sales Service  → /sales/...
    location /sales {
        proxy_pass         http://sales-service;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # Purchase Service → /purchases/...
    location /purchases {
        proxy_pass         http://purchase-service;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # Health check endpoints per service
    location /stock/health {
        proxy_pass         http://stock-service/health;
        proxy_set_header   Host              $host;
    }

    location /sales/health {
        proxy_pass         http://sales-service/health;
        proxy_set_header   Host              $host;
    }

    location /purchase/health {
        proxy_pass         http://purchase-service/health;
        proxy_set_header   Host              $host;
    }
}
