services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    networks:
      - inventory-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  stock-service:
    build: ./stock-service
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/stockdb
    networks:
      - inventory-net
    depends_on:
      db:
        condition: service_healthy

  sales-service:
    build: ./sales-service
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/salesdb
      STOCK_SERVICE_URL: http://stock-service
    networks:
      - inventory-net
    depends_on:
      db:
        condition: service_healthy
      stock-service:
        condition: service_started

  purchase-service:
    build: ./purchase-service
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/purchasedb
      STOCK_SERVICE_URL: http://stock-service
    networks:
      - inventory-net
    depends_on:
      db:
        condition: service_healthy
      stock-service:
        condition: service_started

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./front-end:/usr/share/nginx/html:ro
    networks:
      - inventory-net
    depends_on:
      - stock-service
      - sales-service
      - purchase-service

networks:
  inventory-net:
    driver: bridge

volumes:
  postgres_data:
